services:
  - type: web
    name: pharmachain-api
    runtime: node
    plan: free
    region: oregon
    rootDir: Diverson2k26/HackFrost
    buildCommand: npm install --include=dev && npx hardhat compile && npx vite build
    startCommand: node render-start.cjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: RPC_URL
        value: http://127.0.0.1:8545
      - key: NODE_VERSION
        value: 22.19.0
