services:
  - type: web
    name: pharmachain-api
    runtime: node
    plan: free
    rootDir: Diverson2k26/HackFrost
    buildCommand: npm install --include=dev && npx hardhat compile
    startCommand: node render-start.cjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: RPC_URL
        value: http://127.0.0.1:8545
      - key: CORS_ORIGIN
        sync: false  # Set this to your Vercel frontend URL after deployment
